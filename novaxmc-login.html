<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaxMc - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #3d2963 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-box {
            background: rgba(25, 10, 45, 0.85);
            border-radius: 20px;
            padding: 50px 60px;
            box-shadow: 0 20px 60px rgba(138, 43, 226, 0.4),
                        0 0 100px rgba(138, 43, 226, 0.2),
                        inset 0 0 80px rgba(138, 43, 226, 0.05);
            border: 2px solid rgba(138, 43, 226, 0.3);
            backdrop-filter: blur(10px);
            min-width: 400px;
            transition: all 0.3s ease;
        }

        .login-box:hover {
            box-shadow: 0 25px 70px rgba(138, 43, 226, 0.5),
                        0 0 120px rgba(138, 43, 226, 0.3),
                        inset 0 0 100px rgba(138, 43, 226, 0.08);
            transform: translateY(-5px);
        }

        .logo {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #9d4edd 0%, #c77dff 50%, #e0aaff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(157, 78, 221, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
            position: relative;
        }

        .logo h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #9d4edd, transparent);
            border-radius: 2px;
        }

        .logo p {
            color: #c77dff;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .discord-button {
            background: linear-gradient(135deg, #5865F2 0%, #7289da 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        .discord-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .discord-button:hover::before {
            left: 100%;
        }

        .discord-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(88, 101, 242, 0.6);
            background: linear-gradient(135deg, #6875f3 0%, #8199db 100%);
        }

        .discord-button:active {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(199, 125, 255, 0.6);
            animation: fadeIn 0.8s ease 0.4s backwards;
        }

        .footer-text a {
            color: #c77dff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: #e0aaff;
            text-decoration: underline;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Glow effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.4), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
            animation: pulse 4s ease-in-out infinite;
        }

        .glow-1 {
            top: -150px;
            left: -150px;
        }

        .glow-2 {
            bottom: -150px;
            right: -150px;
            animation-delay: 2s;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        @media (max-width: 500px) {
            .login-box {
                min-width: 320px;
                padding: 40px 30px;
            }

            .logo h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>
            
            <div class="logo">
                <h1>NOVAXMC</h1>
                <p>Minecraft Server</p>
            </div>

            <button class="discord-button" onclick="loginWithDiscord()">
                <svg class="discord-icon" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M60.1045 4.8978C55.5792 2.8214 50.7265 1.2916 45.6527 0.41542C45.5603 0.39851 45.468 0.440769 45.4204 0.525289C44.7963 1.6353 44.105 3.0834 43.6209 4.2216C38.1637 3.4046 32.7345 3.4046 27.3892 4.2216C26.905 3.0581 26.1886 1.6353 25.5617 0.525289C25.5141 0.443589 25.4218 0.40133 25.3294 0.41542C20.2584 1.2888 15.4057 2.8186 10.8776 4.8978C10.8384 4.9147 10.8048 4.9429 10.7825 4.9795C1.57795 18.7309 -0.943561 32.1443 0.293408 45.3914C0.299005 45.4562 0.335386 45.5182 0.385761 45.5576C6.45866 50.0174 12.3413 52.7249 18.1147 54.5195C18.2071 54.5477 18.305 54.5139 18.3638 54.4378C19.7295 52.5728 20.9469 50.6063 21.9907 48.5383C22.0523 48.4172 21.9935 48.2735 21.8676 48.2256C19.9366 47.4931 18.0979 46.6 16.3292 45.5858C16.1893 45.5041 16.1781 45.304 16.3068 45.2082C16.679 44.9293 17.0513 44.6391 17.4067 44.3461C17.471 44.2926 17.5606 44.2813 17.6362 44.3151C29.2558 49.6202 41.8354 49.6202 53.3179 44.3151C53.3935 44.2785 53.4831 44.2898 53.5502 44.3433C53.9057 44.6363 54.2779 44.9293 54.6529 45.2082C54.7816 45.304 54.7732 45.5041 54.6333 45.5858C52.8646 46.6197 51.0259 47.4931 49.0921 48.2228C48.9662 48.2707 48.9102 48.4172 48.9718 48.5383C50.038 50.6034 51.2554 52.5699 52.5959 54.435C52.6519 54.5139 52.7526 54.5477 52.845 54.5195C58.6464 52.7249 64.529 50.0174 70.6019 45.5576C70.6551 45.5182 70.6887 45.459 70.6943 45.3942C72.1747 30.0791 68.2147 16.7757 60.1968 4.9823C60.1772 4.9429 60.1437 4.9147 60.1045 4.8978ZM23.7259 37.3253C20.2276 37.3253 17.3451 34.1136 17.3451 30.1693C17.3451 26.225 20.1717 23.0133 23.7259 23.0133C27.308 23.0133 30.1626 26.2532 30.1066 30.1693C30.1066 34.1136 27.28 37.3253 23.7259 37.3253ZM47.3178 37.3253C43.8196 37.3253 40.9371 34.1136 40.9371 30.1693C40.9371 26.225 43.7636 23.0133 47.3178 23.0133C50.9 23.0133 53.7545 26.2532 53.6986 30.1693C53.6986 34.1136 50.9 37.3253 47.3178 37.3253Z" fill="currentColor"/>
                </svg>
                Mit Discord anmelden
            </button>

            <div class="footer-text">
                Mit Klick auf „Mit Discord anmelden" stimmst du unserer 
                <a href="#datenschutz">Datenschutzerklärung</a> 
                zu und bestätigst, dass 
                <a href="#impressum">Impressum</a> gelesen zu haben.
            </div>
        </div>
    </div>

    <script>
        function loginWithDiscord() {
            // Hier würdest du deine Discord OAuth2 URL einfügen
            // Beispiel:
            // const clientId = 'DEINE_CLIENT_ID';
            // const redirectUri = encodeURIComponent('https://deine-domain.de/callback');
            // const scope = 'identify email';
            // window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}`;
            
            alert('Discord Login würde hier starten!\n\nUm dies zu aktivieren, musst du:\n1. Eine Discord Application erstellen (discord.com/developers)\n2. OAuth2 konfigurieren\n3. Client ID und Redirect URI in den Code einfügen');
        }

        // Particle effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const glow1 = document.querySelector('.glow-1');
            const glow2 = document.querySelector('.glow-2');
            
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            
            glow1.style.transform = `translate(${moveX}px, ${moveY}px)`;
            glow2.style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });
    </script>
</body>
</html>
